<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testament Creative</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="cursor-glow"></div>

<header>
<div class="logo fade-in">Testament Creative</div>
</header>

<section class="hero">
<h1 class="fade-in">Designing brands with purpose</h1>

<p class="fade-in">
We create strategic, high-impact brand identities that connect, convert, and endure.
</p>

<p class="fade-in tagline">
Clarity-led branding for ambitious businesses.
</p>

<button onclick="scrollToContact()" class="fade-in">Get in Touch</button>
</section>

<section id="contact" class="contact">
<h2 class="fade-in">Get in Touch</h2>

<form action="https://submit-form.com/enug07Dzq" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Tell us about your project" required></textarea>

<input type="hidden" name="_redirect" value="https://testamentcreative.co.uk?success=true">

<button type="submit">Send Enquiry</button>

</form>

<p id="form-status" style="display:none;"></p>

</section>

<script>

// Fade-in animation
const elements = document.querySelectorAll('.fade-in');

const observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
if (entry.isIntersecting) {
entry.target.classList.add('visible');
}
});
}, { threshold: 0.1 });

elements.forEach(el => observer.observe(el));


// Cursor glow
const glow = document.querySelector('.cursor-glow');

document.addEventListener('mousemove', (e) => {
glow.style.left = e.clientX + 'px';
glow.style.top = e.clientY + 'px';
});


// Scroll to contact
function scrollToContact() {
document.getElementById('contact').scrollIntoView({
behavior: 'smooth'
});
}


// Success message via URL
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
const status = document.getElementById("form-status");
status.style.display = "block";
status.textContent = "Thank you — your enquiry has been sent.";
}

</script>

</body>
</html>
