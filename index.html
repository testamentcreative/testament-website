<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Testament Creative</title>

<link href="https://fonts.googleapis.com/css2?family=Alice&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <h1>Testament Creative</h1>
</header>

<section class="hero">
    <h2>Designing brands with purpose</h2>
</section>

<section class="contact">

    <h2>Get in Touch</h2>

    <form id="contact-form" action="https://submit-form.com/enug07Dzq" method="POST">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Tell us about your project" required></textarea>

        <button type="submit">Send Enquiry</button>

    </form>

    <div id="success-message">Thank you — your enquiry has been sent.</div>
    <div id="error-message">Something went wrong. Please try again.</div>

</section>

<script>
const form = document.getElementById('contact-form');
const successMessage = document.getElementById('success-message');
const errorMessage = document.getElementById('error-message');

form.addEventListener('submit', async function(e) {
    e.preventDefault();

    successMessage.classList.remove('show');
    errorMessage.classList.remove('show');

    const data = new FormData(form);

    try {
        const response = await fetch(form.action, {
            method: 'POST',
            body: data,
            headers: {
                'Accept': 'application/json'
            }
        });

        if (response.ok) {
            form.reset();
            successMessage.classList.add('show');
        } else {
            errorMessage.classList.add('show');
        }

    } catch (error) {
        errorMessage.classList.add('show');
    }
});
</script>

</body>
</html>
